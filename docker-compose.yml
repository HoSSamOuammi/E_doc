services:
  db:
    image: mysql:8.4
    container_name: e-doc-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestion_etudiants
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: e-doc-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DATABASE_URL: mysql://root:root@db:3306/gestion_etudiants
    ports:
      - "5000:5000"

  prisma-studio:
    build:
      context: ./backend
    container_name: e-doc-prisma-studio
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:root@db:3306/gestion_etudiants
    command: sh -c "npx prisma db push && npm run seed && npm run studio"
    ports:
      - "5555:5555"

volumes:
  mysql_data:
